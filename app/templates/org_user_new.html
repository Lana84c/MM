{% extends "base.html" %}

{% block content %}
<section class="hero">
    <div class="hero-card">
        <p class="eyebrow">Organization Admin</p>
        <h1>Add User to {{ organization.name }}</h1>
        <p class="lead">
            Create a new learner, instructor, or organization admin for this organization.
        </p>
    </div>
</section>

<section class="catalog">
    <div class="auth-card">
        <form method="post" action="/org/users/new" class="auth-form">
            <label for="full_name">Full Name</label>
            <input id="full_name" name="full_name" type="text" required />

            <label for="email">Email</label>
            <input id="email" name="email" type="email" required />

            <label for="password">Temporary Password</label>
            <input id="password" name="password" type="password" required />

            <label for="role">Role</label>
            <select id="role" name="role" required>
                <option value="learner">Learner</option>
                <option value="instructor">Instructor</option>
                <option value="org_admin">Org Admin</option>
            </select>

            <div class="actions">
                <button type="submit" class="button primary">Create User</button>
                <a class="button secondary" href="/org/users">Cancel</a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
